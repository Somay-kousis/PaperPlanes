services:
  cockroach:
    image: cockroachdb/cockroach:latest-v25.2
    command: start-single-node --insecure
    ports:
      - "26257:26257"
      - "8081:8080" # DB console
    volumes:
      - cockroach-data:/cockroach/cockroach-data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health?ready=1"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build: ./backend
    env_file:
      - path: .env
        required: false
    environment:
      # Local compose always talks to the bundled cockroach node; the Cloud
      # cluster is used by host-run dev (.env) and the EC2 deployment.
      DATABASE_URL: postgresql://root@cockroach:26257/defaultdb?sslmode=disable
    volumes:
      # boto3 credentials for Bedrock/S3 in local dev; EC2 uses an instance profile.
      - ~/.aws:/root/.aws:ro
    ports:
      - "8000:8000"
    depends_on:
      cockroach:
        condition: service_healthy

  frontend:
    build: ./frontend
    # Optional locally: with APP_API_TOKEN unset the backend leaves the routes
    # ungated and nginx forwards an empty bearer, which it ignores.
    environment:
      APP_API_TOKEN: ${APP_API_TOKEN:-}
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  cockroach-data:
